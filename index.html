<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tool Hub</title>
    <meta name="description" content="A minimal hub for tools, spreadsheets, maps, and downloads.">
    <style>
      :root {
        --bg: #f6f5f1;
        --panel: #ffffff;
        --ink: #202522;
        --muted: #66706a;
        --line: #dad7ce;
        --accent: #1f6f5f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        overflow: hidden;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        display: grid;
        gap: 18px;
        grid-template-rows: auto 1fr;
        height: 100vh;
        padding: clamp(18px, 3vw, 34px);
      }

      header {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      .brand {
        display: grid;
        gap: 4px;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 4.4rem);
        line-height: 0.92;
        margin: 0;
      }

      .brand p,
      .note,
      .empty,
      small {
        color: var(--muted);
      }

      .brand p {
        font-size: 0.98rem;
        margin: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      button,
      .upload-label {
        align-items: center;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        cursor: pointer;
        display: inline-flex;
        font-weight: 700;
        min-height: 42px;
        padding: 10px 14px;
      }

      button.active,
      .upload-label {
        background: var(--ink);
        border-color: var(--ink);
        color: white;
      }

      input[type="file"] {
        display: none;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 16px;
        min-height: 0;
        padding: clamp(16px, 2vw, 22px);
      }

      .toolbar {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
      }

      .search {
        max-width: 360px;
        width: 100%;
      }

      .search input {
        background: #fbfaf7;
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 42px;
        outline: 0;
        padding: 10px 12px;
        width: 100%;
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        min-height: 0;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 10px;
        min-height: 150px;
        padding: 15px;
      }

      .card-top {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      .type {
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .favorite {
        min-height: 32px;
        padding: 6px 10px;
      }

      .favorite.active {
        background: #efe5c5;
        border-color: #d8bf68;
        color: #60480c;
      }

      h2,
      h3,
      p {
        margin: 0;
      }

      .card p {
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.4;
      }

      .card a {
        color: var(--accent);
        font-weight: 700;
      }

      .downloads {
        display: none;
      }

      .downloads.active,
      .tools.active {
        display: grid;
      }

      .tools {
        display: none;
      }

      .download-list {
        display: grid;
        gap: 10px;
        overflow: auto;
        padding-right: 4px;
      }

      .download-row {
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr auto auto;
        min-height: 58px;
        padding: 10px 12px;
      }

      .download-row a {
        color: var(--accent);
        font-weight: 700;
      }

      .danger {
        color: #a13f34;
      }

      @media (max-width: 860px) {
        body {
          overflow: auto;
        }

        .app {
          height: auto;
          min-height: 100vh;
        }

        header,
        .toolbar {
          align-items: stretch;
          display: grid;
        }

        .actions {
          justify-content: start;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <div class="brand">
          <h1>Tool Hub</h1>
          <p>Tools, sheets, maps, and useful files in one quiet place.</p>
        </div>
        <div class="actions" aria-label="Primary actions">
          <button class="active" id="toolsButton" type="button">Tools</button>
          <button id="downloadsButton" type="button">Downloads</button>
          <label class="upload-label" for="fileInput">Upload File</label>
          <input id="fileInput" type="file" multiple>
        </div>
      </header>

      <section class="panel">
        <div class="tools active" id="toolsView">
          <div class="toolbar">
            <h2>Launchpad</h2>
            <label class="search">
              <input id="searchInput" placeholder="Search tools, sheets, maps...">
            </label>
          </div>
          <div class="grid" id="toolGrid"></div>
        </div>

        <div class="downloads" id="downloadsView">
          <div class="toolbar">
            <div>
              <h2>Downloads</h2>
              <p class="note">Files uploaded here are saved in this browser only.</p>
            </div>
            <button class="danger" id="clearDownloads" type="button">Clear list</button>
          </div>
          <div class="download-list" id="downloadList"></div>
        </div>
      </section>
    </main>

    <script>
      const tools = [
        {
          name: "Budget Forecast",
          type: "Spreadsheet",
          description: "Monthly planning, annual targets, and variance checks.",
          url: "#"
        },
        {
          name: "Project Intake Tracker",
          type: "Tool",
          description: "Triage requests, size effort, and track next steps.",
          url: "#"
        },
        {
          name: "Market Coverage Map",
          type: "Map",
          description: "Pinned locations, coverage notes, and territory context.",
          url: "#"
        },
        {
          name: "Weekly Metrics",
          type: "Spreadsheet",
          description: "Recurring numbers and lightweight commentary.",
          url: "#"
        },
        {
          name: "Resource Library",
          type: "Reference",
          description: "Templates, docs, examples, and useful links.",
          url: "#"
        },
        {
          name: "Route Planner",
          type: "Map",
          description: "Stops, drive time, and neighborhood notes.",
          url: "#"
        }
      ];

      const favoriteKey = "tool-hub-minimal-favorites";
      const downloadsKey = "tool-hub-local-downloads";
      const toolsButton = document.querySelector("#toolsButton");
      const downloadsButton = document.querySelector("#downloadsButton");
      const toolsView = document.querySelector("#toolsView");
      const downloadsView = document.querySelector("#downloadsView");
      const searchInput = document.querySelector("#searchInput");
      const toolGrid = document.querySelector("#toolGrid");
      const fileInput = document.querySelector("#fileInput");
      const downloadList = document.querySelector("#downloadList");
      const clearDownloads = document.querySelector("#clearDownloads");

      function readJson(key, fallback) {
        try {
          return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
        } catch {
          return fallback;
        }
      }

      function saveJson(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function showView(view) {
        const showingDownloads = view === "downloads";
        toolsView.classList.toggle("active", !showingDownloads);
        downloadsView.classList.toggle("active", showingDownloads);
        toolsButton.classList.toggle("active", !showingDownloads);
        downloadsButton.classList.toggle("active", showingDownloads);
      }

      function renderTools() {
        const favorites = new Set(readJson(favoriteKey, []));
        const query = searchInput.value.trim().toLowerCase();
        const matches = tools.filter((tool) =>
          `${tool.name} ${tool.type} ${tool.description}`.toLowerCase().includes(query)
        );

        toolGrid.innerHTML = matches.map((tool) => {
          const isFavorite = favorites.has(tool.name);
          return `
            <article class="card">
              <div class="card-top">
                <span class="type">${tool.type}</span>
                <button class="favorite ${isFavorite ? "active" : ""}" data-favorite="${tool.name}" type="button">
                  ${isFavorite ? "Saved" : "Save"}
                </button>
              </div>
              <h3>${tool.name}</h3>
              <p>${tool.description}</p>
              <a href="${tool.url}" aria-label="Open ${tool.name}">Open</a>
            </article>
          `;
        }).join("") || `<p class="empty">No matching tools.</p>`;
      }

      function renderDownloads() {
        const files = readJson(downloadsKey, []);
        downloadList.innerHTML = files.map((file, index) => `
          <div class="download-row">
            <div>
              <strong>${file.name}</strong><br>
              <small>${file.size} KB · uploaded ${file.date}</small>
            </div>
            <a href="${file.data}" download="${file.name}">Download</a>
            <button class="danger" data-remove="${index}" type="button">Remove</button>
          </div>
        `).join("") || `<p class="empty">No uploads yet. Use Upload File to add one.</p>`;
      }

      toolsButton.addEventListener("click", () => showView("tools"));
      downloadsButton.addEventListener("click", () => {
        showView("downloads");
        renderDownloads();
      });
      searchInput.addEventListener("input", renderTools);

      toolGrid.addEventListener("click", (event) => {
        const button = event.target.closest("[data-favorite]");
        if (!button) return;
        const favorites = new Set(readJson(favoriteKey, []));
        const name = button.dataset.favorite;
        if (favorites.has(name)) {
          favorites.delete(name);
        } else {
          favorites.add(name);
        }
        saveJson(favoriteKey, [...favorites]);
        renderTools();
      });

      fileInput.addEventListener("change", async (event) => {
        const existing = readJson(downloadsKey, []);
        const files = [...event.target.files];
        for (const file of files) {
          const data = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
          });
          existing.unshift({
            name: file.name,
            size: Math.max(1, Math.round(file.size / 1024)),
            date: new Date().toLocaleDateString(),
            data
          });
        }
        saveJson(downloadsKey, existing.slice(0, 20));
        fileInput.value = "";
        showView("downloads");
        renderDownloads();
      });

      downloadList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-remove]");
        if (!button) return;
        const files = readJson(downloadsKey, []);
        files.splice(Number(button.dataset.remove), 1);
        saveJson(downloadsKey, files);
        renderDownloads();
      });

      clearDownloads.addEventListener("click", () => {
        saveJson(downloadsKey, []);
        renderDownloads();
      });

      renderTools();
      renderDownloads();
    </script>
  </body>
</html>
