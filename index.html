<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tool Hub</title>
    <meta name="description" content="A minimal hub for tools, spreadsheets, maps, and shared downloads.">
    <style>
      :root {
        --bg: #f6f5f1;
        --panel: #ffffff;
        --ink: #202522;
        --muted: #66706a;
        --line: #dad7ce;
        --accent: #1f6f5f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        overflow: hidden;
      }

      .app {
        display: grid;
        gap: 18px;
        grid-template-rows: auto 1fr;
        height: 100vh;
        padding: clamp(18px, 3vw, 34px);
      }

      header {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 4.4rem);
        line-height: 0.92;
        margin: 0;
      }

      h2,
      h3,
      p {
        margin: 0;
      }

      .brand {
        display: grid;
        gap: 4px;
      }

      .brand p,
      .card p,
      .note {
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      a.button,
      button {
        align-items: center;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-weight: 700;
        min-height: 42px;
        padding: 10px 14px;
        text-decoration: none;
      }

      a.primary {
        background: var(--ink);
        border-color: var(--ink);
        color: white;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 16px;
        min-height: 0;
        padding: clamp(16px, 2vw, 22px);
      }

      .toolbar {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
      }

      .search {
        max-width: 360px;
        width: 100%;
      }

      .search input {
        background: #fbfaf7;
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 42px;
        outline: 0;
        padding: 10px 12px;
        width: 100%;
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        min-height: 0;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 10px;
        min-height: 145px;
        padding: 15px;
      }

      .card-top {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      .type {
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .favorite {
        min-height: 32px;
        padding: 6px 10px;
      }

      .favorite.active {
        background: #efe5c5;
        border-color: #d8bf68;
        color: #60480c;
      }

      .card p {
        font-size: 0.92rem;
        line-height: 1.4;
      }

      .card a {
        color: var(--accent);
        font-weight: 700;
      }

      .empty {
        color: var(--muted);
      }

      @media (max-width: 860px) {
        body {
          overflow: auto;
        }

        .app {
          height: auto;
          min-height: 100vh;
        }

        header,
        .toolbar {
          align-items: stretch;
          display: grid;
        }

        .actions {
          justify-content: start;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <div class="brand">
          <h1>Tool Hub</h1>
          <p>Tools, sheets, maps, and shared files in one quiet place.</p>
        </div>
        <div class="actions" aria-label="Primary actions">
          <a class="button primary" href="https://topbuild-my.sharepoint.com/:f:/g/personal/michael_guenther_topbuild_cloud/IgD2RNJZeHK6S7Vw0PVUFCieAYpi8KECe2g6IkM8P1Ykab8" target="_blank" rel="noopener">Upload File</a>
          <a class="button" href="https://topbuild-my.sharepoint.com/:f:/g/personal/michael_guenther_topbuild_cloud/IgD2RNJZeHK6S7Vw0PVUFCieAdMtj8RiWofzhb_zR0tm9_M" target="_blank" rel="noopener">Downloads</a>
        </div>
      </header>

      <section class="panel">
        <div class="toolbar">
          <div>
            <h2>Launchpad</h2>
            <p class="note">Downloads open the shared SharePoint folder for coworkers.</p>
          </div>
          <label class="search">
            <input id="searchInput" placeholder="Search tools, sheets, maps...">
          </label>
        </div>
        <div class="grid" id="toolGrid"></div>
      </section>
    </main>

    <script>
      const tools = [
        {
          name: "Budget Forecast",
          type: "Spreadsheet",
          description: "Monthly planning, annual targets, and variance checks.",
          url: "#"
        },
        {
          name: "Project Intake Tracker",
          type: "Tool",
          description: "Triage requests, size effort, and track next steps.",
          url: "#"
        },
        {
          name: "Market Coverage Map",
          type: "Map",
          description: "Pinned locations, coverage notes, and territory context.",
          url: "#"
        },
        {
          name: "Weekly Metrics",
          type: "Spreadsheet",
          description: "Recurring numbers and lightweight commentary.",
          url: "#"
        },
        {
          name: "Resource Library",
          type: "Reference",
          description: "Templates, docs, examples, and useful links.",
          url: "#"
        },
        {
          name: "Route Planner",
          type: "Map",
          description: "Stops, drive time, and neighborhood notes.",
          url: "#"
        }
      ];

      const favoriteKey = "tool-hub-minimal-favorites";
      const searchInput = document.querySelector("#searchInput");
      const toolGrid = document.querySelector("#toolGrid");

      function readFavorites() {
        try {
          return new Set(JSON.parse(localStorage.getItem(favoriteKey) || "[]"));
        } catch {
          return new Set();
        }
      }

      function writeFavorites(favorites) {
        localStorage.setItem(favoriteKey, JSON.stringify([...favorites]));
      }

      function renderTools() {
        const favorites = readFavorites();
        const query = searchInput.value.trim().toLowerCase();
        const matches = tools.filter((tool) =>
          `${tool.name} ${tool.type} ${tool.description}`.toLowerCase().includes(query)
        );

        toolGrid.innerHTML = matches.map((tool) => {
          const isFavorite = favorites.has(tool.name);
          return `
            <article class="card">
              <div class="card-top">
                <span class="type">${tool.type}</span>
                <button class="favorite ${isFavorite ? "active" : ""}" data-favorite="${tool.name}" type="button">
                  ${isFavorite ? "Saved" : "Save"}
                </button>
              </div>
              <h3>${tool.name}</h3>
              <p>${tool.description}</p>
              <a href="${tool.url}" aria-label="Open ${tool.name}">Open</a>
            </article>
          `;
        }).join("") || `<p class="empty">No matching tools.</p>`;
      }

      searchInput.addEventListener("input", renderTools);
      toolGrid.addEventListener("click", (event) => {
        const button = event.target.closest("[data-favorite]");
        if (!button) return;
        const favorites = readFavorites();
        const name = button.dataset.favorite;
        if (favorites.has(name)) {
          favorites.delete(name);
        } else {
          favorites.add(name);
        }
        writeFavorites(favorites);
        renderTools();
      });

      renderTools();
    </script>
  </body>
</html>
